# NeuroChain Stellar CLI - Comprehensive User Guide (Demo)

This guide is intended for the **browser-based CLI REPL demo**.

- You do not need to run local binary commands.
- The demo uses a server-side `neurochain-stellar` REPL.
- You only type REPL commands into the demo input.
- Press `Enter` to run the current input. Use `Shift+Enter` to add another line,
  or select `Run` to send the complete multiline block.

If you need local build/run instructions or deeper server/API references, see:

- `docs/stellar_actions_guide.md`

## 1) Get started in 10 minutes (demo)

Run these in REPL, in order:

```text
help
help all
show setup
setup testnet
wallet_bootstrap: demo-boot
show setup
```

What this does:

- shows commands (`help`, `help all`)
- applies testnet baseline (`setup testnet`)
- creates a wallet alias + friendbot funding (`wallet_bootstrap`)

## 2) Operating model in short

- REPL interprets your commands into an ActionPlan.
- Flow pipeline is: `simulate -> preview -> confirm -> submit`.
- At startup, wallet/source may be `(not set)`; set it with `wallet: <alias>` or use `wallet_bootstrap`.
- Startup default `asset_allowlist` is `XLM`.
- Important allowlist note:
  - `asset_allowlist` is a session safety filter, it does **not** create/mint tokens on-chain.
  - Example `asset_allowlist: XLM,TESTUSD:<ISSUER_G>` means only these assets are allowed in this session.
  - Keep `XLM` in the list unless you intentionally want to block XLM operations.
- Idle timeout is 30 minutes in this demo server: if no command is sent for 30 minutes, the REPL session expires and session key-material is cleared.

## 3) Base setup (REPL commands)

### 3.1 Wallet + network

Quick wallet actions:

- Create a new wallet alias/keypair:

```text
wallet_generate: demo-alias
```

- Use an existing alias as active wallet/source:

```text
wallet: demo-alias
```

```text
network: testnet
wallet_generate: demo-alias
wallet: demo-alias
show setup
```

Note for existing/older wallet aliases:

- After `wallet: <alias>`, run `show setup` once so UI workspace syncs `wallet/source` immediately.
- If account (`G...`) is still empty, run one balance query:
  - `stellar.account.balance account="<YOUR_G_ADDRESS>" asset="XLM"`

### 3.2 Testnet wallet ready in one command

```text
setup testnet
wallet_bootstrap: demo-user
show setup
```

### 3.3 Runtime settings

```text
horizon: https://horizon-testnet.stellar.org
friendbot: https://friendbot.stellar.org
stellar_cli: stellar
simulate_flag: "--send no"
```

### 3.4 Threshold (`intent_threshold`): why it matters and when to use it

`intent_threshold` defines how confident the model must be before an intent is accepted as an action plan.

```text
intent_threshold: 0.55
show setup
```

Higher value means:

- safer behavior (model must be more certain)
- more `Unknown`/low-confidence blocks (exit `5`)
- good for public demos or cases where wrong actions are unacceptable

Lower value means:

- more permissive behavior (accepts less certain intents)
- fewer blocks, but higher risk of wrong interpretation
- good for internal testing when you want to inspect model behavior

Practical recommendation:

- Start at `0.55` (demo default).
- Raise to `0.65-0.75` for a more production-like cautious demo.
- Lower to `0.40-0.50` only for controlled testing.

Note:

- In REPL command, use decimal point (`0.55`), not comma.
- UI field may display value as `0,55`, but REPL setting command uses point notation.

## 4) Stellar Classic operations (REPL, manual “hard-coded”)

### 4.1 Account balance

```text
stellar.account.balance account="G..." asset="XLM"
```

### 4.2 Account creation (from source wallet)

```text
stellar.account.create destination="G..." starting_balance="2"
```

Tip:

- Easiest way in demo is to duplicate the Stellar CLI tab.
- In the second tab create a receiver account (for example `wallet_generate: recv1` or `wallet_bootstrap: recv1`).
- Use that `G...` address in the `destination` field.

### 4.3 Friendbot funding on testnet

```text
stellar.account.fund_testnet account="G..."
```

### 4.4 Create your own test token (clear step-by-step)

If you do not have public testnet USDC access, create and use your own Classic issued asset (example: `TESTUSD`).

Full demo-safe flow (issuer + dist + user):

```text
# Create/fund three wallets on testnet:
setup testnet
wallet_bootstrap: issuer
wallet_bootstrap: dist
wallet_bootstrap: user

# Save addresses from output:
# <ISSUER_G> <DIST_G> <USER_G>

# Allowlist for this issued asset (if using enforce mode):
asset_allowlist: XLM,TESTUSD:<ISSUER_G>

# dist trusts issuer asset:
wallet: dist
stellar.change_trust asset_code="TESTUSD" asset_issuer="<ISSUER_G>" limit="1000000"

# issuer "mints" by paying TESTUSD to dist:
wallet: issuer

## 8) ZK Guardrails, enforce modes, and exit codes

### 8.1 Enable enforce

```text
asset_allowlist: XLM,USDC:GISSUER
soroban_allowlist: C1:transfer,C2
allowlist_enforce
contract_policy: contracts/C.../policy.json
contract_policy_enforce
```

`soroban_allowlist` format:

- `CONTRACT_ID` = allow all functions for that contract
- `CONTRACT_ID:FUNCTION` = allow only that function
- example above: only `transfer` is allowed for `C1`, while all functions are allowed for `C2`

### 8.2 Disable enforce

```text
allowlist_enforce off
contract_policy_enforce off
```

### 8.3 Exit codes

- `3` = allowlist block (enforce)
- `4` = contract policy block (enforce)
- `5` = intent safety block (`Unknown` / `slot_missing` / `slot_type_error` / low confidence)

`intent_threshold` directly affects `low confidence` cases: higher threshold increases exit `5` blocks.

Reset after test:

### 8.4 What does `contract_policy_enforce` mean?

`contract_policy_enforce` means Soroban calls are checked against policy rules before submit.

- `contract_policy_enforce` ON:
  - policy violation stops execution immediately (hard fail)
  - REPL returns a block and exit code `4`
  - transaction is not submitted
- `contract_policy_enforce off`:
  - policy violation appears as warning/diagnostics
  - this switch does not force a hard block

Why this is useful:

- blocks wrong function execution:
  - if intent tries to call a function not allowed by policy, the call is blocked
- blocks wrong arguments:
  - if policy requires specific arg type/shape, invalid payload cannot reach chain
- reduces “AI misunderstood prompt” risk:
  - even if intent classification is wrong, enforce acts as final safety net
- saves time and cost:
  - error stops before submit, avoiding unnecessary tx fees and failed chain operations

Practical interpretation:

- For a safe demo: keep `contract_policy_enforce` ON.
- For freer experimentation: you can set it OFF, but accept higher error risk.

Typical safe usage:

```text
contract_policy: /opt/neurochain/contracts/<DEPLOYED_CONTRACT_ID>/policy.json
contract_policy_enforce
set stellar intent from AI: 'Invoke contract <DEPLOYED_CONTRACT_ID> function hello args={"to":"World"}'
```

### 8.5 ZK Guardrail attestation on Stellar

NeuroChain ZK Guardrail proves that the known deterministic evaluator checked a typed ActionPlan against a private policy. The policy rules stay private; the public result binds the evaluator image, ActionPlan hash, policy commitment/version, decision, exit/reason codes and audit nullifier.

Testnet application contract:

```text
CAAHGPTAPNSUC67NIU2M23BB5RSMK6RMYAH7ISATOKYLRHTNC7QJUN5B
```

Ready browser-REPL flow:

```text
setup testnet
wallet_bootstrap: zk-demo
zk_contract: CAAHGPTAPNSUC67NIU2M23BB5RSMK6RMYAH7ISATOKYLRHTNC7QJUN5B
zk.demo approved
zk.stellar.verify approved
zk.stellar.attest approved
zk status
```

The `Run full ZK demo` button starts a fresh isolated session, creates and
Friendbot-funds a testnet wallet, then runs local binding plus read-only Stellar
verification for all three scenarios. It never submits an attestation. After
the guided sequence succeeds, the separate `Submit testnet attestation` button
is enabled and asks for confirmation before sending one approved proof-
verification transaction.

Guided browser flow:

1. Select `Run full ZK demo` and wait for the guided sequence to complete.
2. Review the `approved`, `requires_approval`, and `blocked` decisions plus
   their read-only Stellar verification results in the terminal.
3. Select the newly enabled `Submit testnet attestation` button and confirm the
   explicit testnet transaction.
4. The button changes to `Attestation submitted`. Workspace shows the contract
   ID, transaction hash, and `successful` transaction status.
5. Run `zk status` to see the retained Stellar verification mode, attestation
   state, transaction hash, nullifier state, and ActionPlan no-submit boundary.

Available bundled scenarios:

| Scenario | Verified decision | Exit | Submit meaning |
| --- | --- | ---: | --- |
| `approved` | `approved` | `0` | eligible only for a later, separate approval/submit flow |
| `requires_approval` | `requires_approval` | `0` | no submit |
| `blocked` | `blocked` / allowlist | `3` | no submit |

Run the other two scenarios:

```text
zk.demo requires_approval
zk.stellar.verify requires_approval
zk.demo blocked
zk.stellar.verify blocked
zk status
```

What each command does:

- `zk.demo <scenario>` checks the bundled ActionPlan, journal and proof bindings locally. It never submits.
- `zk.stellar.verify <scenario>` verifies the genuine proof through the deployed Soroban verifier chain using `--send no`. It is repeatable and does not consume the nullifier.
- `zk.stellar.attest <scenario>` submits a testnet transaction that calls the same permissionless `verify` function. It prints the transaction hash and StellarExpert link, but does not consume the nullifier or submit the underlying ActionPlan.
- `zk status` combines the latest local binding with the latest successful
  Stellar verification mode, transaction hash, submission state, nullifier
  state and the unchanged ActionPlan no-submit boundary.
- `zk.verify action_plan="..." proof="..."` reads local files and is therefore disabled in the browser REPL.
- `zk.stellar.consume <scenario>` stores the nullifier, requires owner authentication and is deliberately disabled in the browser REPL.

Important safety boundary:

- A valid proof or payment never grants permission to submit the underlying ActionPlan.
- `requires_approval` remains a no-submit result.
- Browser users can run read-only verification or explicitly submit the testnet verification attestation. They cannot consume the shared demo nullifier.

Hosted deployment:

- The public REPL runs the ZK-enabled ARM64 NeuroChain CLI with `NC_ZK_GUARDRAIL_CONTRACT` configured for the testnet application contract above.
- `approved`, `requires_approval`, and `blocked` have been verified through read-only `zk.stellar.verify` calls on the hosted demo.
- The guided hosted flow produced a successful testnet `verify` transaction: [07821d...23e2](https://stellar.expert/explorer/testnet/tx/07821d7e44b9e3b5e19c3cd407bea77709facd74ba6b9e84db162b8051b723e2).
- After submission, both Workspace and `zk status` retain the same transaction hash. The nullifier remains unconsumed and the underlying ActionPlan remains blocked from automatic submission.
- Use `Clear` to start a fresh isolated REPL session after testing.

## 10) Command catalog (`help all` structure)

### 10.1 Core setup (value required)

- `AI: "path"` -> set intent model path
- `intent_threshold: <f32>` -> set intent confidence threshold
- `network: testnet|mainnet|public` -> set active network for flow
- `wallet: <stellar-key-alias>` -> set active source wallet alias
- `wallet_generate: <alias>` -> generate a local stellar key alias
- `wallet_bootstrap: <alias>` -> generate alias + friendbot-fund it
- `horizon: https://...` -> set Horizon URL override
- `friendbot: https://...|off` -> set Friendbot URL or disable it
- `stellar_cli: <bin>` -> set stellar CLI binary path/name
- `simulate_flag: "--send no"` -> set soroban simulate flag
- `asset_allowlist: XLM,USDC:G...` -> set NC_ASSET_ALLOWLIST equivalent
- `soroban_allowlist: C1:transfer,C2` -> set NC_SOROBAN_ALLOWLIST equivalent (`contract` or `contract:function`)
- `contract_policy: <path>` -> set NC_CONTRACT_POLICY equivalent
- `contract_policy_dir: <dir>` -> set NC_CONTRACT_POLICY_DIR equivalent
- `zk_contract: C...` -> set the deployed NeuroChain ZK Guardrail contract
- `zk_instruction_leeway: 10000000` -> set the Soroban ZK verifier instruction leeway

### 10.2 Toggles (on/off)

- `txrep` -> enable txrep preview in flow
- `txrep off` -> disable txrep preview in flow
- `allowlist_enforce` -> enable allowlist enforce
- `allowlist_enforce off` -> disable allowlist enforce
- `contract_policy_enforce` -> enable contract policy enforce
- `contract_policy_enforce off` -> disable contract policy enforce
- `debug` -> enable intent pipeline trace
- `debug off` -> disable intent pipeline trace

### 10.3 Prompt/Action

- `set <var> from AI: "..."` -> predict with active model and store variable (fail-fast: no raw-prompt fallback on model/predict error)
- `set stellar intent from AI: "..."` -> classify prompt -> ActionPlan
- `set intent from AI: "Transfer 5 XLM to G..."` -> legacy alias (still supported)
- `macro from AI: "..."` -> not supported in `neurochain-stellar` (use `set stellar intent from AI`)
- `plain text prompt` -> classify prompt -> ActionPlan
- `stellar.* / soroban.* lines` -> manual action-plan mode
- `soroban.contract.deploy alias="..." wasm="..."` -> manual deploy action (`.nc` / REPL)
- `zk.demo approved|requires_approval|blocked` -> inspect a bundled proof without submitting
- `zk.stellar.verify approved|requires_approval|blocked|last` -> verify through Soroban read-only
- `zk.stellar.attest approved|requires_approval|blocked|last` -> submit a testnet verification transaction and print its explorer link
- `zk status` -> show the latest local binding, Stellar verification, attestation state and transaction hash

### 10.4 Utility

- `help` -> quick start
- `help all` -> show every command
- `help dsl` -> show normal NeuroChain DSL language help
- `show setup` -> print active setup
- `show config` -> print active config
- `setup testnet` -> set network+horizon+friendbot baseline
- `exit` -> leave REPL

Unified toggle rule:

- settings line by itself enables (`txrep`, `allowlist_enforce`, `contract_policy_enforce`, `debug`)
- `off` in same line disables (`txrep off`, `allowlist_enforce off`, `contract_policy_enforce off`, `debug off`)

## 11) Most common demo issues

- `friendbot unavailable`:
  - run `setup testnet` and ensure `friendbot` is not `off`
- wallet/source missing:
  - run `wallet_bootstrap: <alias>` or `wallet: <alias>`
- alias/account not visible in Workspace right away:
  - run `show setup` once after `wallet: <alias>`
  - run one balance query to populate account:
    - `stellar.account.balance account="<YOUR_G_ADDRESS>" asset="XLM"`
- session expires while idle:
  - if no command is sent for 30 minutes, session closes and wallet key-material is cleared
  - reconnect and set wallet/source again (`wallet: <alias>`)
- `Submit testnet attestation` is disabled:
  - select `Run full ZK demo` first and wait until all three scenarios finish
  - the button is enabled only after the guided read-only verification succeeds
- transaction does not go through:
  - check allowlist/policy/enforce settings
  - check whether `exit_code` is 3/4/5
- expected txrep but not visible:
  - run `txrep` before action
- ZK contract is not configured:
  - set `zk_contract: CAAHGPTAPNSUC67NIU2M23BB5RSMK6RMYAH7ISATOKYLRHTNC7QJUN5B`
- ZK verification reports wallet/source missing:
  - run `setup testnet` and `wallet_bootstrap: <alias>` before `zk.stellar.verify` or `zk.stellar.attest`
- ZK attestation does not print a transaction hash:
  - confirm the active network is exactly `testnet`, the funded wallet alias is still active and Horizon is reachable
- ZK command is not recognized:
  - select `Clear` to reconnect with a fresh session, then run `help all`; report the deployment if the ZK section is still missing
- ZK binding mismatch:
  - fail closed; do not submit anything, and confirm the scenario, network and configured contract

    const copyToClipboard = async (text) => {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.opacity = "0";
      area.style.pointerEvents = "none";
      document.body.appendChild(area);
      area.focus();
      area.select();

      const ok = document.execCommand("copy");
      document.body.removeChild(area);
      if (!ok) throw new Error("copy_failed");
    };

    const addCopyButtons = (root) => {
      const blocks = root.querySelectorAll("pre");
      blocks.forEach((pre) => {
        if (pre.dataset.copyButtonReady === "1") return;

        const codeEl = pre.querySelector("code");
        const copyText = (codeEl ? codeEl.textContent : pre.textContent || "").replace(/\n$/, "");

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "code-copy-btn mono";
        btn.innerHTML = '<i class="bi bi-copy"></i><span>Copy</span>';

        btn.addEventListener("click", async () => {
          try {
            await copyToClipboard(copyText);
            btn.classList.add("copied");
            btn.innerHTML = '<i class="bi bi-check2"></i><span>Copied</span>';
          } catch (_err) {
            btn.classList.remove("copied");
            btn.innerHTML = '<i class="bi bi-exclamation-circle"></i><span>Failed</span>';
          }

          window.setTimeout(() => {
            btn.classList.remove("copied");
            btn.innerHTML = '<i class="bi bi-copy"></i><span>Copy</span>';
          }, 1200);
        });

        pre.appendChild(btn);
        pre.dataset.copyButtonReady = "1";
      });
    };

    addCopyButtons(content);

    const headings = Array.from(content.querySelectorAll("h2"));
    headings.forEach((h, i) => {
      const id = "sec-" + (i + 1);
      h.id = id;

      a.href = "#" + id;
      a.className = "toc-link";

        ? headingText
        : `${i + 1}) ${headingText}`;

        a.prepend(icon);
      }
      tocList.appendChild(a);
    });

    const links = Array.from(document.querySelectorAll(".toc-link"));
    if (links[0]) links[0].classList.add("active");

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        links.forEach((link) => link.classList.remove("active"));
        const active = document.querySelector('.toc-link[href="#' + entry.target.id + '"]');
        if (active) active.classList.add("active");
      });
    }, { rootMargin: "-35% 0px -55% 0px", threshold: 0.01 });

    headings.forEach((h) => observer.observe(h));
